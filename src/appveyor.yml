# begin-snippet: AppVeyorArtifacts
on_failure:
  - ps: |
      $root = (Get-Location).Path
      Get-ChildItem *.received.* -Recurse | % {
        $rel = $_.FullName.Substring($root.Length + 1)
        Push-AppveyorArtifact $_.FullName -FileName $rel
      }
# end-snippet
test: off
# xunit.v3 projects are not included: they use xunit's own command line rather than
# the Microsoft.Testing.Platform one, so --report-trx is not a valid option for them.
# They auto-enable xunit's AppVeyor reporter instead. Fixie has no MTP runner at all.
on_finish:
  - pwsh: |
      $url = "https://ci.appveyor.com/api/testresults/mstest/$env:APPVEYOR_JOB_ID"
      $client = [System.Net.WebClient]::new()
      foreach ($trx in Get-ChildItem -Recurse -Filter *.trx -ErrorAction SilentlyContinue)
      {
        Write-Host "Uploading $($trx.FullName)"
        $client.UploadFile($url, $trx.FullName)
      }
after_build:
  - pwsh: |
      if ($isWindows) {
        Get-ChildItem nugets/*.nupkg -recurse | % { Push-AppveyorArtifact $_.FullName -FileName $_.Name }
      }